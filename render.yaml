services:
  # The Node.js API Service
  - type: web
    name: superlabs-backend
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run db:fix
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: superlabs-db
          property: connectionString

# Managed PostgreSQL Database
databases:
  - name: superlabs-db
    plan: free
    databaseName: superlabs
    user: superlabs
